      <stop offset="0" stop-color="#73B8FF"/>
      <stop offset="1" stop-color="#2F7BFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="292" y1="208" x2="366" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB056"/>
      <stop offset="1" stop-color="#E76B25"/>
